services:
  db:
    image: postgres:16-alpine
    container_name: moonrise-db
    environment:
      POSTGRES_USER: moonrise
      POSTGRES_PASSWORD: moonrise_secret
      POSTGRES_DB: moonrise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: